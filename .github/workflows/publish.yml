name: Publish to NPM

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for OIDC and provenance
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm CLI
        run: npm install -g npm@latest # Ensures npm v11.5.1+ for OIDC Trusted Publishing

      - name: Install Dependencies
        run: npm install # Using npm install because package-lock.json is gitignored

      - name: Run Tests
        run: npm test

      - name: Publish to NPM (OIDC Trusted Publishing)
        run: npm publish --provenance
